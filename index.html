<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Privé TV</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/controls.css">
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        #video-container { width: 100vw; height: 100vh; background: black; }
        video { width: 100%; height: 100%; }
        .instructions { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; z-index: 10; }
    </style>
</head>
<body>

<div class="instructions">
    Laden... Als het zwart blijft, klik rechtsboven op het "schild" icoon van je browser en sta "onveilige inhoud" toe.
</div>

<div id="video-container">
    <video id="video" controls autoplay></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.compiled.js"></script>
<script>
    const manifestUri = 'http://line.tivi-ott.net/T341AC/FADY1C';

    async function initApp() {
        shaka.polyfill.installAll();
        if (shaka.Player.isBrowserSupported()) {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            try {
                await player.load(manifestUri);
            } catch (e) {
                console.error('Fout bij laden', e);
            }
        }
    }
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
